<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prayer request_hsm.high</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <!-- 📌 SDK 연동 -->
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans KR"', 'sans-serif'],
            display: ['"Playfair Display"', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    /* 📌 스타일 고정 */
    .border-active { border: 1px solid rgba(168, 85, 247, 0.45) !important; }
    .border-default { border: 1px solid rgba(168, 85, 247, 0.3) !important; }
    .btn-inactive { color: rgba(156, 163, 175, 0.6) !important; }
    .btn-active { color: #ffffff !important; }

    /* 📌 사이드바 애니메이션 */
    #sidebar { transition: transform 0.3s ease-in-out; }
    .sidebar-open { transform: translateX(0) !important; }

    @keyframes floatUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    .float-up { animation: floatUp 0.6s ease-out forwards; }
    .shimmer-text { background: linear-gradient(90deg, #a855f7, #d946ef, #ec4899, #a855f7); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
    .submit-btn { background: linear-gradient(135deg, #6d28d9, #9333ea, #a855f7); }
    
    input:focus, textarea:focus, select:focus { outline: none !important; box-shadow: none !important; }
    #user-name, #urgent-contact-1, #urgent-contact-2, #prayer-text { color: #ffffff !important; }
    #user-name::placeholder, #urgent-contact-1::placeholder, #urgent-contact-2::placeholder, #prayer-text::placeholder { color: rgba(156, 163, 175, 0.6) !important; }
    
    .contact-grid { display: grid; grid-template-columns: 2.5fr 1fr 3fr 1fr 3fr; align-items: center; width: 100%; gap: 0; }
    .contact-input { height: 44px; text-align: center; font-size: 12px; border-radius: 0.75rem; background: rgba(20, 8, 45, 0.6); width: 100%; }
    .custom-toggle-btn { background: rgba(20, 8, 45, 0.6) !important; transition: all 0.2s ease-in-out; }
  </style>
 </head>
 <body class="h-full text-neutral-100 font-sans" style="background: linear-gradient(135deg, #0f0520 0%, #1e0a3c 50%, #0f0520 100%);">

  <!-- 📌 사이드바 (메뉴 연동) -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar()"></div>
  <aside id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-[#120724] z-50 transform -translate-x-full border-r border-purple-500/30 p-6">
    <div class="flex justify-between items-center mb-8">
      <span class="text-purple-400 font-bold">HSM Admin</span>
      <button onclick="toggleSidebar()"><i data-lucide="x" class="text-white"></i></button>
    </div>
    <nav class="space-y-4">
      <a href="#" class="block p-3 rounded-lg hover:bg-purple-900/30">교역자 대시보드</a>
      <a href="#" class="block p-3 rounded-lg hover:bg-purple-900/30">교사 관리 페이지</a>
      <a href="#" class="block p-3 rounded-lg hover:bg-purple-900/30">마스터 설정</a>
    </nav>
  </aside>

  <div class="relative z-10 max-w-lg mx-auto px-4 py-8">
    <button onclick="toggleSidebar()" class="mb-6"><i data-lucide="menu" class="text-purple-400"></i></button>
    
    <header class="text-center mb-8 float-up">
     <h1 class="text-3xl font-black mb-2 shimmer-text font-display">Prayer Request</h1>
    </header>
    
    <form id="prayer-form" onsubmit="handleSubmit(event)">
      <!-- 📌 01 인적사항 -->
      <section class="mb-6 rounded-2xl p-6" style="background: rgba(30, 10, 60, 0.8);">
       <label class="block mb-2 font-semibold text-sm text-white"><span style="color: #fbbf24;">*</span> 이름</label> 
       <input type="text" id="user-name" placeholder="이름을 입력해 주세요." class="border-default w-full h-11 rounded-xl px-4 text-xs" oninput="updateFieldBorderState(this)" onkeypress="return /[A-Za-z가-힣\s]/.test(event.key)">
       
       <div class="mt-4 grid grid-cols-2 gap-3">
        <div>
          <label class="block mb-2 font-semibold text-sm text-white">성별</label>
          <div class="flex gap-2">
           <button type="button" id="gender-male" class="flex-1 border-default custom-toggle-btn h-11 rounded-xl text-center text-xs btn-inactive" onclick="selectGender('남자')">남자</button> 
           <button type="button" id="gender-female" class="flex-1 border-default custom-toggle-btn h-11 rounded-xl text-center text-xs btn-inactive" onclick="selectGender('여자')">여자</button>
          </div>
        </div>
       </div>
      </section>

      <!-- 📌 02 연락처 -->
      <section class="mb-6 rounded-2xl p-6" style="background: rgba(30, 10, 60, 0.8);">
       <label class="block text-[11px] uppercase tracking-wider text-neutral-300 mb-3">연락처</label>
       <div class="contact-grid">
        <div class="h-11 flex items-center justify-center text-xs border-default rounded-xl" style="background: rgba(20, 8, 45, 0.6);">010</div>
        <div class="text-center text-gray-500">-</div>
        <input type="text" id="urgent-contact-1" inputmode="numeric" maxlength="4" placeholder="0000" class="border-default contact-input btn-inactive" oninput="handleContactInput(this, 'urgent-contact-2')">
        <div class="text-center text-gray-500">-</div>
        <input type="text" id="urgent-contact-2" inputmode="numeric" maxlength="4" placeholder="0000" class="border-default contact-input btn-inactive" oninput="handleContactInput(this, null)">
       </div>
      </section>
      
      <button type="submit" class="submit-btn w-full py-4 rounded-2xl text-sm font-bold text-white">기도제목 보내기</button>
    </form>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('sidebar-open');
      document.getElementById('sidebar-overlay').classList.toggle('hidden');
    }

    function updateFieldBorderState(el) {
      if (el.value.trim().length > 0) { el.classList.add('border-active'); el.classList.remove('border-default'); }
      else { el.classList.remove('border-active'); el.classList.add('border-default'); }
    }

    function selectGender(gender) {
      const maleBtn = document.getElementById('gender-male');
      const femaleBtn = document.getElementById('gender-female');
      [maleBtn, femaleBtn].forEach(b => { b.classList.remove('border-active', 'btn-active'); b.classList.add('border-default', 'btn-inactive'); });
      const target = gender === '남자' ? maleBtn : femaleBtn;
      target.classList.add('border-active', 'btn-active');
      target.classList.remove('btn-inactive');
    }

    function handleContactInput(el, nextId) {
      el.value = el.value.replace(/[^0-9]/g, '');
      if (el.value.length === 4) {
        el.classList.add('border-active'); el.classList.remove('border-default');
        if (nextId) document.getElementById(nextId).focus();
      } else {
        el.classList.remove('border-active'); el.classList.add('border-default');
      }
    }

    // 📌 데이터 연동 로직
    async function handleSubmit(e) {
      e.preventDefault();
      const record = { name: document.getElementById('user-name').value, timestamp: new Date().toISOString() };
      if (window.dataSdk) {
        await window.dataSdk.create(record);
        alert('데이터가 성공적으로 전송되었습니다.');
      }
    }
    
    lucide.createIcons();
  </script>
 </body>
</html>

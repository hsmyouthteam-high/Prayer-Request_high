<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>prayer request_hsm.high</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans KR"', 'sans-serif'],
            display: ['"Playfair Display"', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
    }
    .float-up { animation: floatUp 0.6s ease-out forwards; }
    .float-up-1 { animation-delay: 0.1s; opacity: 1; }
    .float-up-2 { animation-delay: 0.2s; opacity: 1; }
    .float-up-3 { animation-delay: 0.3s; }
    .float-up-4 { animation-delay: 0.4s; }
    .float-up-5 { animation-delay: 0.5s; }
    .float-up-6 { animation-delay: 0.6s; }
    .shimmer-text {
      background: linear-gradient(90deg, #a855f7, #d946ef, #ec4899, #a855f7);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    .submit-btn {
      background: linear-gradient(135deg, #6d28d9, #9333ea, #a855f7);
      background-size: 200% 200%;
      transition: all 0.4s ease;
    }
    .submit-btn:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(168, 85, 247, 0.35);
    }
    .submit-btn:disabled {
      opacity: 0.4;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }
    .toast-enter { animation: floatUp 0.4s ease-out; }
    
    /* 포커스 시 테두리선도 은은하게 정돈 */
    input:focus, textarea:focus, select:focus {
      outline: none !important;
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2) !important;
      border-color: rgba(168, 85, 247, 0.4) !important;
    }
    
    #user-name,
    #urgent-contact-1,
    #urgent-contact-2,
    #prayer-text {
      color: #ffffff !important;
      caret-color: #ffffff !important;
    }
    
    #user-name::placeholder,
    #urgent-contact-1::placeholder,
    #urgent-contact-2::placeholder,
    #prayer-text::placeholder {
      color: rgba(156, 163, 175, 0.6) !important;
    }
    
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
    select {
      appearance: none;
    }
    select option {
      background: rgba(20, 8, 45, 0.9);
      color: #ffffff;
    }
    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-fall 1.5s ease-out forwards;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.2); border-radius: 99px; }
    
    /* 📌 연락처 그리드 모바일 최적화 배치 설계 (비율 조정으로 이탈 절대 방지) */
    .contact-grid {
      display: grid;
      grid-template-cols: 2.5fr 1fr 3fr 1fr 3fr;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }
    /* 테두리 70% 톤다운(rgba 투명도 0.12 적용) */
    .contact-box-010 {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      font-size: 12px;
      color: #d4d4d8;
      background: rgba(20, 8, 45, 0.6);
      border: 1px solid rgba(168, 85, 247, 0.12);
      border-radius: 0.75rem;
    }
    /* 테두리 70% 톤다운(rgba 투명도 0.12 적용) */
    .contact-input {
      height: 44px;
      text-align: center;
      font-size: 12px;
      border-radius: 0.75rem;
      background: rgba(20, 8, 45, 0.6);
      border: 1px solid rgba(168, 85, 247, 0.12);
      width: 100%;
      box-sizing: border-box;
    }
    .contact-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(156, 163, 175, 0.6);
      font-size: 12px;
    }

    /* 📌 버튼 디자인 시스템: 테두리 70% 톤다운 강제 고정 */
    .custom-toggle-btn {
      background: rgba(20, 8, 45, 0.6) !important;
      border: 1px solid rgba(168, 85, 247, 0.12) !important;
      transition: color 0.2s ease-in-out;
      box-shadow: none !important;
      transform: none !important;
    }
    .custom-toggle-btn.inactive {
      color: rgba(156, 163, 175, 0.6) !important;
    }
    .custom-toggle-btn.active {
      color: #ffffff !important;
    }
    * { box-sizing: border-box; }
  </style>
 </head>
 <body class="h-full text-neutral-100 font-sans" style="background: linear-gradient(135deg, #0f0520 0%, #1e0a3c 50%, #0f0520 100%);">
  <div id="app-wrapper" class="h-full w-full overflow-auto">
   <div class="fixed inset-0 pointer-events-none overflow-hidden" style="z-index:0;">
    <div class="absolute top-0 right-0 w-96 h-96 rounded-full" style="background: radial-gradient(circle, rgba(196,181,253,0.12) 0%, transparent 70%);"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 rounded-full" style="background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);"></div>
   </div>
   <div class="relative z-10 max-w-lg mx-auto px-4 py-8" style="min-height:100%;">
    <header class="text-center mb-8 float-up float-up-1">
     <p id="church-name" class="text-xs tracking-[0.3em] uppercase text-purple-400 mb-4 font-medium">한소망교회 고등부</p>
     <h1 id="main-title" class="text-3xl font-black mb-2 shimmer-text font-display" style="line-height:1.3;">Prayer Request</h1>
     <p id="subtitle-text" class="text-neutral-400 text-sm font-light">하나님께 마음을 나누는 안전한 공간</p>
    </header>
    <main id="form-tab" role="tabpanel">
     <form id="prayer-form" onsubmit="handleSubmit(event)" novalidate>
      <section class="mb-6 float-up float-up-3 rounded-2xl p-6" aria-labelledby="personal-heading" style="background: rgba(30, 10, 60, 0.8); border: 1px solid rgba(168, 85, 247, 0.12); position: relative; z-index: 20;">
       <h2 id="personal-heading" class="font-semibold flex items-center gap-2 mb-4" style="color: #ffffff;"><span style="color: #fbbf24; font-size: 1rem; min-width: 24px;">01</span> <span class="flex-1 h-px" style="background: rgba(251, 191, 36, 0.3);"></span> <span style="font-size: 1rem; text-align: right; flex-shrink: 0; color: #fbbf24;">인적사항</span></h2>
       <div class="space-y-3">
        <div><label for="user-name" class="block mb-2 font-semibold text-sm" style="color: #ffffff;"><span style="color: #fbbf24;">*</span> 이름</label> <input type="text" id="user-name" placeholder="이름을 입력해 주세요." class="w-full h-11 rounded-xl px-4 text-xs" style="background: rgba(20, 8, 45, 0.6); border: 1px solid rgba(168, 85, 247, 0.12);" maxlength="1500" onkeypress="if(event.key==='Enter') event.preventDefault();">
        </div>
        <div class="grid grid-cols-2 gap-3">
         <div><label class="block mb-2 font-semibold text-sm" style="color: #ffffff;"><span style="color: #fbbf24;">*</span> 성별</label>
          <div class="flex gap-2">
            <button type="button" id="gender-male" class="flex-1 custom-toggle-btn inactive h-11 rounded-xl text-center font-normal text-xs" onclick="selectGender('남자')">남자</button> 
            <button type="button" id="gender-female" class="flex-1 custom-toggle-btn inactive h-11 rounded-xl text-center font-normal text-xs" onclick="selectGender('여자')">여자</button>
          </div>
         </div>
         <div><label for="user-grade" class="block mb-2 font-semibold text-sm" style="color: #ffffff;"><span style="color: #fbbf24;">*</span> 마을</label> <select id="user-grade" class="w-full h-11 rounded-xl px-4 cursor-pointer text-xs" style="background: rgba(20, 8, 45, 0.6); border: 1px solid rgba(168, 85, 247, 0.12); color: rgba(156, 163, 175, 0.6);" onchange="updateSelectStyle(this)"> <option value="" disabled selected>마을을 선택해 주세요.</option> <option value="고1">고1 마을</option> <option value="고2">고2 마을</option> <option value="고3">고3 마을</option> <option value="중등">중등 마을</option> </select>
         </div>
        </div>
       </div>
      </section>

      <section class="mb-6 float-up float-up-4 rounded-2xl p-6" aria-labelledby="prayer-heading" style="background: rgba(30, 10, 60, 0.8); border: 1px solid rgba(168, 85, 247, 0.12); position: relative; z-index: 20;">
       <h2 id="prayer-heading" class="font-semibold flex items-center gap-2 mb-4" style="color: #ffffff;"><span style="color: #fbbf24; font-size: 1rem; min-width: 24px;">02</span> <span class="flex-1 h-px" style="background: rgba(251, 191, 36, 0.3);"></span> <span style="font-size: 1rem; text-align: right; flex-shrink: 0; color: #fbbf24;">기도제목</span></h2><label for="prayer-text" class="block mb-2 font-semibold text-sm" style="color: #ffffff;"><span style="color: #fbbf24;">*</span> 나의 기도</label>
       <textarea id="prayer-text" rows="6" maxlength="1500" placeholder="구체적인 상황을 적어주시면,&#13;&#10;그 고백을 마음 깊이 함께 기도하겠습니다." class="w-full rounded-xl px-4 py-3 text-xs resize-none" style="background: rgba(20, 8, 45, 0.6); border: 1px solid rgba(168, 85, 247, 0.12);" oninput="updateCharCount(); limitTextLength(this)"></textarea>
       <div class="text-right mb-4"><span id="char-count" class="text-xs text-neutral-400">0/1,500</span>
       </div>
       <div class="flex items-start gap-2.5">
        <div class="relative flex items-center h-5 mt-0.5"><input type="checkbox" id="urgent-check" class="sr-only peer" onchange="updateUrgentStyle()"> <label for="urgent-check" class="w-5 h-5 rounded-md border-2 border-purple-900 flex items-center justify-center cursor-pointer transition-all peer-checked:bg-red-500 peer-checked:border-red-500" style="border-color: rgba(168, 85, 247, 0.2)">
          <svg class="hidden peer-checked:block w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24" style="stroke-width: 4;"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
          </svg></label>
        </div>
        <div class="flex flex-col"><label for="urgent-check" id="urgent-text" class="block font-semibold text-sm text-white cursor-pointer transition-colors">긴급 기도 요청</label>
         <p class="text-[11px] text-neutral-300 italic leading-relaxed">위급한 상황(사고, 수술 등)으로 즉각적인 기도가 필요한 경우</p>
        </div>
       </div>
       
       <div id="urgent-contact-wrap" class="hidden mt-4 pt-4 border-t border-neutral-700/50">
        <label class="block text-[11px] uppercase tracking-wider text-neutral-300 mb-3 font-medium">
         <span id="urgent-star" class="hidden text-[#fbbf24] text-[11px]">* </span>연락처(긴급 기도 요청 시 필수)
        </label>
        <div class="contact-grid">
         <div class="contact-box-010">010</div>
         <div class="contact-separator">-</div>
         <input type="text" id="urgent-contact-1" inputmode="numeric" maxlength="4" placeholder="0000" class="contact-input text-xs font-normal text-gray-400/60" oninput="handleContactInput(this, 'urgent-contact-2')" onkeypress="preventEnterInContact(event)">
         <div class="contact-separator">-</div>
         <input type="text" id="urgent-contact-2" inputmode="numeric" maxlength="4" placeholder="0000" class="contact-input text-xs font-normal text-gray-400/60" oninput="handleContactInput(this, null)" onkeypress="preventEnterInContact(event)">
        </div>
       </div>
      </section>

      <section class="mb-6 float-up float-up-5 rounded-2xl p-6" aria-labelledby="visibility-heading" style="background: rgba(30, 10, 60, 0.8); border: 1px solid rgba(168, 85, 247, 0.12); position: relative; z-index: 20;">
       <h2 id="visibility-heading" class="font-semibold flex items-center gap-2 mb-6" style="color: #ffffff;"><span style="color: #fbbf24; font-size: 1rem; min-width: 24px;">03</span> <span class="flex-1 h-px" style="background: rgba(251, 191, 36, 0.3);"></span> <span style="font-size: 1rem; text-align: right; flex-shrink: 0; color: #fbbf24;">공개범위</span></h2>
       <div class="space-y-6">
        <div>
         <div class="block mb-2 font-semibold text-sm text-white">전도사님</div>
         <div class="text-xs text-neutral-300 mb-4 leading-relaxed font-normal">여러분의 이름을 기억하며 깊이 기도합니다.</div>
         <button type="button" class="w-full h-11 rounded-xl text-xs font-normal custom-toggle-btn active" disabled>😊 실명</button>
        </div>
        <div>
         <div class="block mb-2 font-semibold text-sm text-white"><span style="color: #fbbf24;">*</span> 모든 선생님들</div>
         <div class="text-xs text-neutral-300 mb-4 leading-relaxed font-normal">고등부 모든 선생님들이 함께 기도합니다.</div>
         <div class="flex gap-2">
           <button type="button" id="leaders-real" class="flex-1 h-11 rounded-xl text-center font-normal text-xs custom-toggle-btn inactive" onclick="selectIdentityOption('leaders', 'real')">😊 실명</button> 
           <button type="button" id="leaders-anon" class="flex-1 h-11 rounded-xl text-center font-normal text-xs custom-toggle-btn inactive" onclick="selectIdentityOption('leaders', 'anonymous')">🤫 익명</button>
         </div>
        </div>
        <div>
         <div class="block mb-2 font-semibold text-sm text-white"><span style="color: #fbbf24;">*</span> 친구들</div>
         <div class="text-xs text-neutral-300 mb-4 leading-relaxed font-normal">고등부 공동체 안에서 함께 나눕니다.</div>
         <div class="flex gap-2">
           <button type="button" id="all-real" class="flex-1 h-11 rounded-xl text-center font-normal text-xs custom-toggle-btn inactive" onclick="selectIdentityOption('all', 'real')">😊 실명</button> 
           <button type="button" id="all-anon" class="flex-1 h-11 rounded-xl text-center font-normal text-xs custom-toggle-btn inactive" onclick="selectIdentityOption('all', 'anonymous')">🤫 익명</button>
         </div>
        </div>
       </div>
      </section>

      <button type="submit" id="submit-btn" class="submit-btn float-up float-up-6 w-full py-4 rounded-2xl text-sm font-bold text-white tracking-wide flex items-center justify-center gap-2 mb-3"> 
        <span id="submit-text">🕊️ 기도제목 보내기</span> 
        <span id="submit-spinner" class="hidden inline-flex">
          <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24">
           <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle> <path class="opacity-75" fill="currentColor"
